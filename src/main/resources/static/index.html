<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>쿠폰 발행 테스트 (jQuery)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body class="container mt-5">
    <div class="card shadow-sm p-4" style="max-width: 450px; margin: auto;">
        <h3 class="mb-4 text-center">🎫 jQuery 쿠폰 시스템</h3>
        
        <div class="mb-3">
            <label class="form-label">쿠폰 ID</label>
            <input type="number" id="couponId" class="form-control" value="1">
        </div>
        
        <div class="mb-3">
            <label class="form-label">사용자 ID</label>
            <input type="number" id="userId" class="form-control" placeholder="사용자 ID 입력">
        </div>

        <button id="btnIssue" class="btn btn-success w-100">쿠폰 신청하기</button>

        <div id="result" class="mt-4 p-3 border rounded d-none"></div>
    </div>

    <script>
        $(document).ready(function() {
            $('#btnIssue').click(function() {
                // 1. 데이터 준비
                const requestData = {
                    couponId: parseInt($('#couponId').val()),
                    userId: parseInt($('#userId').val())
                };

                const $result = $('#result');
                $result.addClass('d-none').removeClass('bg-success bg-danger text-white');

                // 2. AJAX 요청
                $.ajax({
                    url: '/api/v1/coupons/issue',
                    type: 'POST',
                    contentType: 'application/json', // 중요: JSON 형식으로 보냄
                    data: JSON.stringify(requestData), // DTO 구조에 맞게 직렬화
                    success: function(response) {
                        $result.text("✅ 발행 성공! (분산 락 통과)").addClass('bg-success text-white').removeClass('d-none');
                    },
                    error: function(xhr) {
                        const errorMsg = xhr.responseJSON ? xhr.responseJSON.message : "서버 오류 발생";
                        $result.text("❌ 실패: " + errorMsg).addClass('bg-danger text-white').removeClass('d-none');
                    }
                });
            });
        });
    </script>
</body>
</html>
